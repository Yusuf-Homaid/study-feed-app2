name: study_feed
description: Convert educational materials into an X-style interactive study feed.
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter

  # State management
  provider: ^6.1.2

  # File picking (PDF, PPTX, TXT)
  file_picker: ^8.1.2

  # PDF text + image extraction
  syncfusion_flutter_pdf: ^26.2.14
  

  # PPTX parsing (XML based, .pptx is a zip of XML files)
  archive: ^3.6.1
  xml: ^6.5.0

  # Image full-screen pinch-to-zoom lightbox
  photo_view: ^0.15.0

  # Fonts
  google_fonts: ^6.2.1

  # Icons that match X's iconography style
  font_awesome_flutter: ^10.7.0

  # Utility
  path_provider: ^2.1.4
  uuid: ^4.4.2
  cached_network_image: ^3.4.1

  cupertino_icons: ^1.0.8

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^4.0.0

flutter:
  uses-material-design: true
  assets:
    - assets/images/
